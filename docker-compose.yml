services:

  web:
    build:
      context    : ./web
      dockerfile : Dockerfile
    container_name : irrigation-web
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart : unless-stopped
    networks:
      - public
      - internal

  api:
    build : .
    container_name : irrigation-api
    env_file: .env
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      - mlflow
    restart : unless-stopped
    networks:
      - public
      - internal

  mlflow:
    build :
      context: .
      dockerfile : Dockerfile.mlflow
    container_name : mlflow
    environment:
      - MLFLOW_S3_ENDPOINT_URL=${MINIO_ENDPOINT}
      - AWS_ACCESS_KEY_ID=${MINIO_ACCESS_KEY}
      - AWS_SECRET_ACCESS_KEY=${MINIO_SECRET_KEY}
      - MLFLOW_AUTH_CONFIG_PATH=/mlflow/auth_config.ini
      - MLFLOW_FLASK_SERVER_SECRET_KEY=${MLFLOW_SECRET_KEY}
    command         : >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:///mlflow.db
        --default-artifact-root s3://bucket-ml/irrigation/mlflow
        --app-name basic-auth
        --allowed-hosts ${MLFLOW_ALLOWED_HOSTS:-localhost,127.0.0.1}
    volumes:
      - mlflow_data:/mlflow
      - ./mlflow_auth_config.ini:/mlflow/auth_config.ini:ro
    restart         : unless-stopped
    ports:
      - "5000:5000"
    networks:
      - internal
      - public

  # minio:
  #   image: quay.io/minio/minio:latest
