  #   volumes:
  #     - minio_data:/data
  #   restart: unless-stopped
  #   networks:
  #     - internal
  #     - public

networks:
  public:
    external : true
    name     : alpha_network
  internal:
    internal : true

volumes:
  mlflow_data:
  minio_data:
